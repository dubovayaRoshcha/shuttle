app:
  name: "shuttle-server"
  env: "dev"
  default_robot_id: "r1"    # используется в telemetry, если нет ID в сообщении

http:
  port: 8080                # порт, на котором запускается API

logging:
  level: "info"             # варианты: debug, info, error

storage:
  driver: "memory"          # пока только in-memory реализация

rosbridge:
  url: "ws://localhost:9090"   # адрес rosbridge_websocket
  topics:
    - "/odom"                 # список ROS-топиков для подписки
